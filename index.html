<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#201813" />
    <meta name="description" content="超能女人用超能 H5 动画设计稿预览" />
    <title>超能女人用超能 H5</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="超能女人用超能 H5">
      <section class="phone" id="phone">
        <iframe
          class="scene-frame"
          id="sceneFrame"
          src="./assets/figma-pdf/cover-1.pdf#toolbar=0&navpanes=0&scrollbar=0"
          title="封面 1"
        ></iframe>

        <div class="topbar">
          <button class="voice-button" id="voiceButton" type="button" aria-label="播放配音">配音</button>
          <span class="counter" id="counter">1 / 4</span>
        </div>

        <button class="tap-layer" id="tapLayer" type="button" aria-label="点击进入下一页"></button>

        <div class="toast" id="toast" aria-live="polite">点击继续</div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
